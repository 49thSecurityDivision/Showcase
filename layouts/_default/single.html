{{ define "main" }}
    <div class="glass-panel" style="padding: 3rem;">
        <div class="meta" style="justify-content: center; font-size: 1.1rem; margin-bottom: 2rem;">
            <span>{{ .Date.Format "2006/01/02" }}</span>
            <span>|</span>
            <span>
                {{ range (.GetTerms "authors") }}
                    <a href="{{ .Permalink }}" style="color:var(--accent);">@{{ .LinkTitle }}</a>
                {{ end }}
            </span>
        </div>
        
        <h1 style="text-align:center; font-size: 2.5rem; margin-top: 0; margin-bottom: 3rem;">{{ .Title }}</h1>
        
        <div class="post-content">
            {{ .Content }}
        </div>
    </div>
    
    <div style="text-align: center; margin-top: 2rem;">
        <a href="/" class="btn" style="border: 1px solid #334155; padding: 0.5rem 1rem; border-radius: 4px;">&lt; Back to Dispatches</a>
    </div>
{{ end }}
