{{ define "main" }}
    <h1 style="text-align:center; font-size: 3rem; margin-bottom: 2rem;">ROSTER</h1>
    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 2rem;">
        {{ range .Data.Terms.ByCount }}
            <a href="{{ .Page.Permalink }}" style="text-decoration: none;">
                <div class="glass-panel" style="text-align: center; margin-bottom: 0;">
                    <div style="font-size: 3rem; margin-bottom: 1rem;">👤</div>
                    <h2 style="margin: 0;">@{{ .Page.Title }}</h2>
                    <p style="color: var(--text-muted); font-family: var(--font-mono);">{{ .Count }} Dispatch(es)</p>
                </div>
            </a>
        {{ end }}
    </div>
{{ end }}
