{{ define "main" }}
    <header>
        <div class="section-card">
            <div class="section-image" style="margin-bottom: 2rem;">
                <img src="https://github.com/{{ .Title }}.png" 
                     style="width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--accent); box-shadow: var(--shadow-l1);"
                     loading="lazy">
            </div>
            <div class="section-details">
                <h3 class="section-count">Member Profile</h3>
                <h1 class="section-term">@{{ .Title }}</h1>
                <div class="section-description" style="margin-top: 1rem; color: var(--card-text-color-main); font-size: 1.1rem;">
                    {{ .Content }}
                </div>
            </div>
        </div>
    </header>

    <h2 class="section-title">Dispatches</h2>
    <section class="article-list--compact">
        {{ range .Pages }}
            {{ partial "article-list/compact" . }}
        {{ end }}
    </section>

    {{ partialCached "footer/footer" . }}
{{ end }}
