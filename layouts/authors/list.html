{{ define "main" }}
    <div class="glass-panel" style="text-align: center; margin-bottom: 4rem;">
        <div style="font-size: 4rem; margin-bottom: 1rem;">👤</div>
        <h1 style="font-size: 2.5rem; margin-top: 0; margin-bottom: 1rem;">@{{ .Title }}</h1>
        <div class="post-content" style="max-width: 600px; margin: 0 auto; color: var(--text-muted);">
            {{ .Content }}
        </div>
    </div>

    <h2 style="font-size: 2rem; border-bottom: 1px solid #334155; padding-bottom: 1rem; margin-bottom: 2rem;">Dispatches by @{{ .Title }}</h2>
    
    <div class="posts">
        {{ range .Pages }}
        <a href="{{ .Permalink }}" style="text-decoration: none; color: inherit; display: block;">
            <div class="glass-panel" style="padding: 1.5rem;">
                <div class="meta" style="margin-bottom: 0.5rem;">
                    <span>{{ .Date.Format "2006/01/02" }}</span>
                </div>
                <h3 style="margin: 0 0 0.5rem 0; font-size: 1.5rem;">{{ .Title }}</h3>
                <div class="post-content" style="font-size: 1rem; color: var(--text-muted); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">
                    {{ .Summary }}
                </div>
            </div>
        </a>
        {{ end }}
    </div>
{{ end }}
